version: 2


models:

  - name: stg_crm_customers
    description: "Standardized CRM customer profile data."

    columns:

      - name: customer_id
        description: "Unique customer identifier."
        tests:
          - unique
          - not_null


      - name: signup_date
        description: "Date when the customer registered."
        tests:
          - not_null


      - name: country
        description: "Customer country."


      - name: age
        description: "Customer age."


      - name: email_opt_in
        description: "Customer email marketing consent flag."


      - name: dbt_loaded_at
        description: "Timestamp when dbt processed the record."