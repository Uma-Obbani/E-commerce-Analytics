version: 2


models:

  - name: stg_meta_ads
    description: "Standardized Meta Ads campaign data from raw source."

    columns:

      - name: date
        description: "Campaign performance reporting date."
        tests:
          - not_null


      - name: campaign_id
        description: "Unique campaign identifier from Meta Ads platform."
        tests:
          - not_null


      - name: campaign_name
        description: "Campaign name from advertising platform."


      - name: channel
        description: "Standardized marketing channel name."
        tests:
          - not_null


      - name: spend
        description: "Advertising spend amount."
        tests:
          - not_null


      - name: impressions
        description: "Number of times ads were displayed."


      - name: clicks
        description: "Number of user clicks generated by ads."


      - name: conversions
        description: "Standardized conversion count from Meta leads."


      - name: dbt_loaded_at
        description: "Timestamp when dbt processed the record."